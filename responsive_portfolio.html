<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Hero Section</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    min-height:100vh;
    padding:40px;
    flex-wrap:wrap;
}

.hero-content{
    max-width:500px;
}

.hero-content h1{
    font-size:40px;
    margin-bottom:15px;
}

.hero-content p{
    font-size:18px;
    margin-bottom:20px;
    color:#555;
    line-height:1.6;
}

.hero-content button{
    padding:12px 25px;
    border:none;
    background:#007BFF;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.hero-content button:hover{
    background:#0056b3;
}

.hero-image img{
    width:300px;
    height:300px;
    border-radius:50%;
    object-fit:cover;
}

@media(max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-content h1{
        font-size:32px;
    }

    .hero-image img{
        width:220px;
        height:220px;
    }
}
</style>

</head>
<body>

<section class="hero">

    <div class="hero-content">
        <h1>Hello, I'm John Doe</h1>
        <p>
            I am a Frontend Web Developer passionate about creating
            responsive and user-friendly websites using HTML, CSS,
            and JavaScript.
        </p>
        <button>View Portfolio</button>
    </div>

    <div class="hero-image">
        <img src="https://via.placeholder.com/300" alt="Profile Image">
    </div>

</section>

</body>
</html>
