<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Registration Form</title>
    <link rel = "stylesheet" href = "student registration form.css">
</head>
<body>
    <h1>Student Registration Form</h1>
    <DIV class = "container">
    <form action ="/register" method = "POST">
        <label for = "firstname">First Name:</label>
        <input type = "text" id = "firstname" placeholder = "First Name" required>
        <br><br>

        <label for = "lastname">Last Name:</label>
        <input type = "text" id = "lastname" placeholder = "Last Name" required>
        <br><br>

        <label for = "roll">Roll Number:</label>
        <input type = "number" id = "rollnumber" placeholder = "Enter your roll number" required>
        <br><br>
        
        <label for = "Phone">Phone Number:</label>
        <input type = "tel" id = "phone" placeholder = "Enter your phone number" required>
        <br><br>
        
        <label for = "dob">Date of Birth:</label>
        <input type = "date" id = "dob" placeholder = "Enter your date of Birth" required>
        <br><br>

        <label for = " Address">Address:</label>
        <input type = "textarea"  id = "address" placeholder = "Enter your address" required ></input>
        <br><br>

        <label for = "email">Email:</label>
        <input type = "email" id = "email" placeholder="Enter your email" required>
        <br><br>

        <label for = "password">Password:</label>
        <input type = "password" id = "password" placeholder="Enter your password" required>
        <br><br>
        
        <button type = "submit" value = "Register" class="btn">Register</button>

        <button type = "reset" value = "Reset" class="btn">Reset</button>
    </form>
    </DIV>
</body>
</html>
