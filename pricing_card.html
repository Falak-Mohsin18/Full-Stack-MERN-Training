<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f2f2f2;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:300px;
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card h2{
    margin-bottom:10px;
}

.price{
    font-size:35px;
    color:#007BFF;
    margin:20px 0;
}

.card ul{
    list-style:none;
    margin-bottom:20px;
}

.card ul li{
    margin:10px 0;
}

button{
    padding:10px 20px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="card">
        <h2>Basic Plan</h2>
        <div class="price">₹499/mo</div>

        <ul>
            <li>5 Projects</li>
            <li>10 GB Storage</li>
            <li>Email Support</li>
        </ul>

        <button>Choose Plan</button>
    </div>

</div>

</body>
</html>
