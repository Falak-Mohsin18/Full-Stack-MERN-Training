<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Box</title>
   <style>
    body{
        display:flex;
        align-items:center;
        justify-content:center;
        font-size: 25px;
        margin:0;
        height:100vh;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
        background-color: teal;
    }
    .container{
        display: flex;
        align-items: center;
        justify-content:space-between;
        gap:20px;
    }
    .box{
        height: 200px;
        width: 200px;
        color: darkblue;
        background-color: lightblue;
        align-items: center;
        justify-content: center;
        display: flex;
    }
   </style>
</head>
<body>
    <div class="container"> 
        <div class="box"> Box 1</div>
        <div class="box"> Box 2</div>
        <div class="box"> Box 3</div>
    </div>
</body>
</html>
